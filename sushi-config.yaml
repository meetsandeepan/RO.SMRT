# sushi-config.yaml is documented https://fshschool.org/docs/sushi/configuration/
# ───────────────────────────────────────────────────
# the id should be lowercase made up of "ihe." + {domain acronym} + "." + {profile acronym/short-name}
# e.g. ihe.iti.mhds, or ihe.iti.basicaudit
id: ihe.ro.smrt
canonical: https://profiles.ihe.net/RO/SMRT
version: 0.0.1-current
name: IHE_RO_SMRT
title: "Shared Management of Radiation Treatments"
description: Defines the workflow and content necessary to connect any device-specific Treatment Management System (TMS) with a single departmental Radiation Oncology Information System (ROIS), enabling a holistic view of all ongoing treatments.
releaseLabel: ci-build
#releaseLabel: ballot
#releaseLabel: trial-use
#releaseLabel: release
#date: 2022-01-02
status: draft
publisher:
  ## Find your domain contact on the https://www.ihe.net/ihe_domains page
  - name: IHE Radiation Oncology Technical Committee
  - url: https://www.ihe.net/ihe_domains/radiation_oncology/
  - email: jill@aapm.org
contact:
  - name: IHE Radiation Oncology Technical Committee
    telecom:
      - system: email
        value: jill@aapm.org
license:  CC-BY-4.0
fhirVersion: 4.0.1
jurisdiction: 'http://unstats.un.org/unsd/methods/m49/m49.htm#001'
#copyright: IHE http://www.ihe.net/Governance/#Intellectual_Property
copyrightYear: 2025+
dependencies:
  ihe.iti.balp:
    id: iheitibasicaudit
    uri: https://profiles.ihe.net/ITI/BALP/ImplementationGuide/ihe.iti.balp
    version: 1.1.x


parameters:  # see https://confluence.hl7.org/display/FHIR/Implementation+Guide+Parameters
  path-resource:
    - input/resources
    - fsh-generated/resources
    - input/examples
#  path-pages:
#    - input/pagecontent
#    - fsh-generated/includes
  show-inherited-invariants: 'false'
  usage-stats-opt-out: 'false'
  logging: progress
  shownav: 'true'
  active-tables: 'false'
  apply-contact: 'true'
  apply-jurisdiction: 'true'
  apply-publisher: 'true'
  apply-version: 'true'
# valueSets and codeSystems should be given OIDs, this is especially required if that codeSystem or valueSet is going to be used by CDA. IHE has an OID root that is managed https://wiki.ihe.net/index.php/OID_Registration, with a branch assigned to each IHE domain. Each IHE domain should have a page where they manage assignments within their branch. an OID should be assigned to each IG, and that OID placed below so that the IG publisher will manage OID assignment to all valueSets and codeSystems defined in that IG. The IG publisher will create an ./oids.ini in the project root that will need to be checked into your github repository.
#  auto-oid-root: 1.3.6.1.4.1.19376.1.5....

#resources:
# list every example here with a name, description and that exampleBoolean is true; These are used to populate the artifacts page, and are needed to eliminate build warnings 
# You may delay filling out this section until you approach publication as it is merely a nice to have and eliminates build warnings -- If you do this then you will need above the autoload-resources true


pages:
# itemize here each narrative page. Include assigned section numbers when appropriate. The order they appear here is the order they will appear in the TOC and on the next/prev navigation.
  index.md:
    title: 1:XX Shared Management of Radiation Therapy (SMRT) Home
    generation: markdown
  volume-1.md:
    title: 1:XX Shared Management of Radiation Therapy (SMRT) Volume 1
    generation: markdown
  RO-SMRT-01.md:
    title: 2:3.Y1 Sync Patient Photo [RO-SMRT-01]
    generation: markdown
  RO-SMRT-02.md:
    title: 2:3.Y2 Report Planning Artifacts [RO-SMRT-02]
    generation: markdown
  RO-SMRT-03.md:
    title: 2:3.Y3 Report Treatment Approval [RO-SMRT-03]
    generation: markdown
  RO-SMRT-04.md:
    title: 2:3.Y4 Report Treatment Artifacts [RO-SMRT-04]
    generation: markdown
  RO-SMRT-05.md:
    title: 2:3.Y5 Report Image Review Results [RO-SMRT-05]
    generation: markdown
  domain-ZZ.md:
    title: 3:?.ZZ SMRT Content Modules
    generation: markdown
  testplan.md:
    title: "Test Plan"
    generation: markdown
  other.md:
    title: Changes to Other IHE Specifications
    generation: markdown
  download.md:
    title: "Download and Analysis"
    generation: markdown
  issues.md:
    title: Significant Changes and Issues
    generation: markdown

menu:
  Home: index.html
  Volume 1:
    Introduction: volume-1.html
    Actors and Transactions: volume-1.html#actors-and-transactions
    Actor Options: volume-1.html#actor-options
    Required Actor Groupings: volume-1.html#required-groupings
    Overview: volume-1.html#overview
    Security Considerations: volume-1.html#security-considerations
    Cross-Profile Considerations: volume-1.html#other-grouping
  Volume 2:
    "Sync Patient Photo [RO-SMRT-01]": RO-SMRT-01.html
    "Report Planning Artifacts [RO-SMRT-02]": RO-SMRT-02.html
    "Report Treatment Approval [RO-SMRT-03]": RO-SMRT-03.html
    "Report Treatment Artifacts [RO-SMRT-04]": RO-SMRT-04.html
    "Report Image Review Results [RO-SMRT-05]": RO-SMRT-05.html
  Volume 3:
    "SMRT Content Modules": domain-ZZ.html
  Artifacts: artifacts.html
  Other:
    Changes to Other IHE Specifications: other.html
    Download and Analysis: download.html
    Test Plan: testplan.html
